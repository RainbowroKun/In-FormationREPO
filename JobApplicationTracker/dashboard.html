<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef4fb;
            padding: 30px;
            margin: 0;
            color: #111;
        }

        h1 {
            text-align: center;
            color: #24458f;
            margin-bottom: 30px;
        }

        button {
            background-color: #24458f;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 16px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        table {
            width: 100%;
            background-color: white;
            border-collapse: collapse;
        }

        th {
            background-color: #f3f6fb;
            color: #24458f;
        }

        th, td {
            padding: 12px;
            border: 1px solid #d4d4d4;
            text-align: left;
        }

        select {
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        td button {
            margin: 0 5px 0 0;
        }

        input {
            width: 90%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
    </style>
</head>

<body>

    <h1>Job Application Dashboard</h1>

    <button onclick="saveApplication()">Add Application</button>
    <p id="message"></p>
    <table>
        <tr>
            <th>Company</th>
            <th>Job Title</th>
            <th>Date Applied</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>

        <tr>
            <td><input type="text" placeholder="Company"></td>
            <td><input type="text" placeholder="Job Title"></td>
            <td><input type="date"></td>
            <td>
                <select>
                    <option>Applied</option>
                    <option>Interview</option>
                    <option>Offer</option>
                    <option>Rejected</option>
                </select>
            </td>
            <td>
                <button onclick="archiveApplication(this)">Archive</button>
                <button onclick="this.closest('tr').remove()">Delete</button>
            </td>
        </tr>
    </table>

    <script>
        function addApplication() {
            var table = document.querySelector("table");
            var row = table.insertRow();

            row.innerHTML =
                "<td><input type='text' placeholder='Company'></td>" +
                "<td><input type='text' placeholder='Job Title'></td>" +
                "<td><input type='date'></td>" +
                "<td>" +
                    "<select>" +
                        "<option>Applied</option>" +
                        "<option>Interview</option>" +
                        "<option>Offer</option>" +
                        "<option>Rejected</option>" +
                    "</select>" +
                "</td>" +
                "<td>" +
                    "<button onclick=\"archiveApplication(this)\">Archive</button> " +
                    "<button onclick=\"this.closest('tr').remove()\">Delete</button>" +
                "</td>";
        }

        function archiveApplication(button) {
            var row = button.closest("tr");
            row.remove();
        }

        function saveApplication() {
    var row = document.querySelector("table tr:nth-child(2)");

    var company = row.cells[0].querySelector("input").value;
    var jobTitle = row.cells[1].querySelector("input").value;
    var dateApplied = row.cells[2].querySelector("input").value;
    var status = row.cells[3].querySelector("select").value;

    var parameters = JSON.stringify({
        company: company,
        jobTitle: jobTitle,
        dateApplied: dateApplied,
        status: status
    });

    $.ajax({
        type: "POST",
        url: "ProjectServices.asmx/AddJobApplication",
        data: parameters,
        contentType: "application/json; charset=utf-8",
        dataType: "json",

        success: function (msg) {
            $("#message").text(msg.d);
        },

        error: function () {
            $("#message").text("Unable to save application.");
        }
    });
    }
    </script>

</body>
</html>
